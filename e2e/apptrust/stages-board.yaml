# ══════════════════════════════════════════════════════════════════════════════
# SwiftShip Stages Board
# Defines the three promotion stages for all SwiftShip AppTrust applications.
#
# AppTrust creates DEV and PROD by default. The intermediate STAGE stage
# must be created manually (UI or REST) or via bootstrap.sh --apptrust.
#
# REST API to create a stage (called by bootstrap.sh):
#   POST $JFROG_URL/apptrust/api/v1/lifecycle-stages
#   Body: { "name": "STAGE", "category": "Promote" }
#
# Promotion CLI (per version):
#   jf apptrust version-promote <app-key> <version> STAGE --sync true
#   jf apptrust version-promote <app-key> <version> PROD  --sync true
#
# Gate types used below:
#   xray_policy  — Xray watch policy must pass (no violations above threshold)
#   evidence     — an evidence slug must exist and be verifiable on the version
#   rego_policy  — a Rego lifecycle policy is evaluated at promotion time
#
# Notification channels reference group owners defined in applications.yaml.
# ══════════════════════════════════════════════════════════════════════════════

version: "1"

stages:

  # ── DEV ────────────────────────────────────────────────────────────────────
  # All new versions land here automatically on version-create.
  # No blocking gates — developers iterate freely.
  # Xray scans run and violations are surfaced (warn mode only).
  - name: "Dev"
    stage_key: DEV
    description: >
      Active development stage. Packages are resolved from the virtual dev
      repos (e.g. demo-maven-dev). Xray scans automatically on every build
      and upload. Violations at this stage produce warnings only — they never
      block a developer's workflow, but they appear in the AppTrust dashboard
      and in the IDE via the JFrog extension.

    entry_policy:
      # References the Xray policy created by setup/bootstrap.sh --xray
      xray_policy: "${JFROG_REPO_PREFIX}-dev-policy"
      enforcement: warn           # findings are reported but do not block entry
      scan_on_entry: true

    promotion_gate:
      # Minimum bar to promote DEV → STAGE:
      # an SBOM must exist (generated by jf rt build-publish with --build-url)
      - type: evidence
        slug: cyclonedx-sbom
        required: true
        description: "A CycloneDX SBOM must be attached before Stage promotion."
      - type: xray_scan
        status: completed         # scan must have completed — findings OK
        description: "Xray indexing must have completed (results may have violations)."

    notification:
      on_violation: []            # no notifications at Dev — noise would be too high
      on_promotion:
        channels:
          - type: github_check    # PR check annotation via Frogbot
        message: "SwiftShip DEV → STAGE promotion requested."

  # ── STAGE ──────────────────────────────────────────────────────────────────
  # Integration / pre-release stage. Resolves from stage repos.
  # Entry is BLOCKED by the stage Xray policy (CVSS >= 7 fails_build).
  # This is where the demo drama happens: payments-service is blocked
  # here because of CVE-2024-21907 and the AGPL iTextSharp violation.
  - name: "Stage"
    stage_key: STAGE
    description: >
      Integration and pre-release stage. Packages are promoted to the stage
      repos (e.g. demo-maven-stage) via Release Lifecycle Management.
      Entry requires a clean Xray scan — any High or Critical CVE blocks
      the promotion and triggers notifications to the owning team.
      The AppTrust Waiver workflow is invoked here when a team cannot fix
      a finding before a release deadline.

    entry_policy:
      xray_policy: "${JFROG_REPO_PREFIX}-stage-policy"
      # bootstrap.sh sets fail_build: true on this policy for CVSS >= 7
      enforcement: block          # promotion to STAGE is rejected on violation
      scan_on_entry: true
      # The payments-strict Rego policy runs as an additional gate
      rego_policy:
        path: "e2e/apptrust/lifecycle-policies/payments-strict.rego"
        applies_to_profiles:
          - strict
          - payments-strict

    promotion_gate:
      # To promote STAGE → PROD, all of the following must pass:
      - type: evidence
        slug: cyclonedx-sbom
        required: true
        description: "SBOM must be present and verifiable."
      - type: evidence
        slug: xray-scan-results
        required: true
        description: "Signed Xray scan results must be attached (jf evd create)."
      - type: xray_policy
        policy: "${JFROG_REPO_PREFIX}-stage-policy"
        violation_action: block
        description: "No CVSS >= 7 violations permitted (or approved waiver required)."
      - type: rego_policy
        path: "e2e/apptrust/lifecycle-policies/standard.rego"
        applies_to_profiles:
          - standard
        description: "Standard policy: warn on CVSS >= 7, block on CVSS >= 9."

    notification:
      on_violation:
        channels:
          - type: slack
            # SLACK_WEBHOOK_URL from .env / GitHub secret
            webhook_env: SLACK_WEBHOOK_URL
          - type: github_pr_comment
            via: frogbot
        message: >
          🚫 SwiftShip {app_name} v{version} was BLOCKED from promoting to STAGE.
          Violations: {violation_count} findings above threshold.
          View in AppTrust: {apptrust_url}
      on_promotion:
        channels:
          - type: slack
            webhook_env: SLACK_WEBHOOK_URL
        message: "✅ SwiftShip {app_name} v{version} promoted to STAGE."

  # ── PROD ───────────────────────────────────────────────────────────────────
  # Production release stage. Artifacts are promoted to prod repos and
  # packaged as an immutable Release Bundle. No CVEs permitted at Critical.
  # The license policy runs as a hard gate — AGPL/GPL cannot be waived here.
  - name: "Prod"
    stage_key: PROD
    description: >
      Production release stage. Artifacts are immutably packaged as a
      signed JFrog Release Bundle and distributed to production repos.
      The strictest gate: no Critical CVEs (CVSS >= 9) permitted for any
      service, plus a license-clean check that blocks GPL/AGPL dependencies
      regardless of waivers. A signed release approval is required.

    entry_policy:
      xray_policy: "${JFROG_REPO_PREFIX}-prod-policy"
      license_policy: "${JFROG_REPO_PREFIX}-license-policy"
      # Both policies are applied; the license policy bans AGPL-3.0, GPL-2.0,
      # GPL-3.0 (see bootstrap.sh for the exact banned_licenses list)
      enforcement: block
      scan_on_entry: true
      rego_policy:
        path: "e2e/apptrust/lifecycle-policies/standard.rego"
        applies_to_profiles:
          - standard
          - ml-specific
          - ai-specific
          - iac-specific
        description: "Standard prod gate: block CVSS >= 9, warn CVSS >= 7."

    promotion_gate:
      # Hard gates to enter PROD — all must pass simultaneously:
      - type: evidence
        slug: cyclonedx-sbom
        required: true
      - type: evidence
        slug: xray-scan-results
        required: true
      - type: evidence
        slug: release-approval
        required: true
        description: >
          A release-approval evidence item must be signed by a member of
          security-team or swiftship-platform group. Created with:
            jf evd create --evd-name release-approval \
              --evd-predicate approval.json \
              --key signing-key.pem
      - type: xray_policy
        policy: "${JFROG_REPO_PREFIX}-prod-policy"
        violation_action: block
        description: "No Critical CVEs (CVSS >= 9) permitted in production."
      - type: xray_policy
        policy: "${JFROG_REPO_PREFIX}-license-policy"
        violation_action: block
        description: "No AGPL or GPL dependencies permitted. Cannot be waived."

    promotion_type: copy            # artifacts are copied to prod repos; original stays in stage
    create_release_bundle: true     # wrap as an immutable signed Release Bundle on prod promotion

    notification:
      on_violation:
        channels:
          - type: slack
            webhook_env: SLACK_WEBHOOK_URL
          - type: email
            group: security-team
        message: >
          🚨 PROD PROMOTION BLOCKED: SwiftShip {app_name} v{version}.
          {violation_count} policy violation(s) must be resolved.
          This incident has been logged. View: {apptrust_url}
      on_promotion:
        channels:
          - type: slack
            webhook_env: SLACK_WEBHOOK_URL
          - type: email
            group: swiftship-platform
        message: "🚀 SwiftShip {app_name} v{version} released to PROD."
