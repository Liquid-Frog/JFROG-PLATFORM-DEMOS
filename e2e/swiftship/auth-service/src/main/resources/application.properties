server.port=8081
spring.application.name=swiftship-auth-service

# VULN-SEED (JAS-Secret): hardcoded JWT secret — JAS flags the hs256-super-secret pattern inline in IDE — Fix: use Spring Cloud Config or inject via environment variable
JWT_SECRET=hs256-super-secret-key-swiftship-do-not-share-2024
JWT_EXPIRY_HOURS=24

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/swiftship_auth
spring.datasource.username=swiftship_user
# VULN-SEED (JAS-Secret): hardcoded DB password in application.properties — Fix: inject from environment variable ${DB_PASSWORD}
spring.datasource.password=prod-db-pass-2024!

spring.jpa.hibernate.ddl-auto=validate
